<section>

    <label class="boto boing">
        <input type="file" id="file-picker" accept=".json,application/json" (change)="onFileSelected($event)" hidden>
        <span class="me-2">Importar</span>
        <!-- <i class="fa-solid fa-file-import ms-1"></i> -->
         <i class="fa-solid fa-arrow-right-to-bracket" style="rotate:90deg"></i>
    </label>
    
    <button class="boto boing" (click)="exportar()">
        <span class="me-2">Exportar</span>
        <i class="fa-solid fa-arrow-up-from-bracket"></i>
    </button>

</section>
